<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicaloser Pack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Vicaloser</h1>
</header>
    
    <h2>Texture Packs</h2>
    <h3>This web by BloxdMan，Background by gemini</h3>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="renderPacks()" placeholder="Search...">
    </div>

    <main>
        <section class="downloads" id="downloads">
        </section>
    </main>

    <footer>
        <p>&copy; Bloxd man, Vicaloser 2026</p>
    </footer>

<div id="packModal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="closeModal()">&times;</span>
        <div id="modalBody">
            </div>
    </div>
</div>

<script>
const packs = [
    {
        id: "vica_50sub",
        name: "50Sub",
        image: "image/50Sub.png",
        file: "files/50SUB T-PACK.zip",
        style: "download-button-astray",
        description: "50訂閱紀念材質包!有著美妙的css，工具為32x32。",
        version: "v1.2.0",
        type: "PVP/Bedwars"
    },
    {
        id: "vica_snow",
        name: "SnowPack",
        image: "image/Snow.png",
        file: "files/Liam t-pack by Vicaloser.zip",
        style: "download-button-relonix",
        description: "Liam委託製作，有短劍和優美的雪地風格css。",
        version: "v1.4.0",
        type: "PVP/Bedwars"
    },
    {
        id: "vica_supay",
        name: "Supay 16x",
        image: "image/Supay.png",
        file: "files/Supay 16x.zip",
        style: "download-button-relonix-white",
        description: "最好的PVP材質包，是從Minecraft轉換過來。",
        version: "v2.0.0",
        type: "PVP/Bedwars/Survival"
    },
    {
        id: "vica_vic32",
        name: "Vic 32x",
        image: "image/Vic 32x.png",
        file: "files/Vic 32x.zip",
        style: "download-button",
        description: "適合生存的32x材質包，部分材質來自Faithful 32x。",
        version: "v0.8.0",
        type: "Survival"
    },
    {
        id: "vica_qwesta",
        name: "Qwesta 16x",
        image: "image/1.png",
        file: "files/Qwesta 16x.zip",
        style: "download-button-qwesta",
        description: "超級好的PVP材質包! 為Minecraft轉換而來。",
        version: "v1.0",
        type: "PVP/Bedwars"
    },
    {
        id: "vica_zion",
        name: "Zion 8x",
        image: "image/zion 8x.png",
        file: "files/Zion 8x.zip",
        style: "download-button-zion",
        description: "【FPS BOOST!】8x PvP Pack by Chr7st Port by me",
        version: "v1.0",
        type: "PVP/Bedwars"
    }
];

function renderPacks() {
    const container = document.getElementById('downloads');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    container.innerHTML = "";

    packs.forEach((pack, index) => {
        if (pack.name.toLowerCase().includes(searchTerm)) {
            const card = `
                <div class="download-item" onclick="openModal(${index})">
                    <img src="${pack.image}" alt="${pack.name}">
                    <div class="info">
                        <h2>${pack.name}</h2>
                        <p style="color: #aaa; font-size: 0.9em;">Description</p>
                    </div>
                    <button class="custom-button ${pack.style}" 
                        onclick="event.stopPropagation(); downloadFile('${pack.file}', '${pack.name}.zip', '${pack.id}')">
                        Download
                    </button>
                </div>
            `;
            container.innerHTML += card;
        }
    });
}

function openModal(index) {
    const pack = packs[index];
    const modal = document.getElementById('packModal');
    const body = document.getElementById('modalBody');
    
    body.innerHTML = `
        <img src="${pack.image}" style="width:100%; border-radius:10px; margin-bottom:15px;">
        <h1 style="color:#63d7ff">${pack.name}</h1>
        <p id="counter_${pack.id}" style="color:#FFD700; font-weight:bold;">Downloads: load...</p>
        <hr border="0" style="border-top:1px solid #444; margin:15px 0;">
        <h3>Description：</h3>
        <p style="line-height:1.6; font-size:1.1em;">${pack.description}</p>
        <p style="margin-top:20px; color:#888;">Version: ${pack.version} | Type: ${pack.type}</p>
        <button class="custom-button ${pack.style}" style="margin-top:15px; width:100%;"
            onclick="downloadFile('${pack.file}', '${pack.name}.zip', '${pack.id}')">
            Download the ${pack.name}
        </button>
    `;
    modal.style.display = "block";
    const updateCount = () => {
        fetch(`https://api.countapi.xyz/get/vicaloser_web/${pack.id}`)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                const countElement = document.getElementById(`counter_${pack.id}`);
                if(countElement) countElement.innerText = `Downloads: ${data.value || 0}`;
            })
            .catch(() => {
                fetch(`https://api.countapi.xyz/hit/vicaloser_web/${pack.id}`);
                const countElement = document.getElementById(`counter_${pack.id}`);
                if(countElement) countElement.innerText = `Downloads: 1`;
            });
    };

    updateCount();
}

function closeModal() {
    document.getElementById('packModal').style.display = "none";
}

function downloadFile(filePath, fileName, packId) {
    if (packId) {
        fetch(`https://countapi.it/hit/vicaloser_web/${packId}`)
            .then(res => res.json())
            .then(data => {
                const countElement = document.getElementById(`counter_${packId}`);
                if(countElement) countElement.innerText = `Downloads: ${data.value}`;
            });
    }

    const link = document.createElement('a');
    link.href = filePath;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

window.onclick = function(event) {
    const modal = document.getElementById('packModal');
    if (event.target == modal) closeModal();
}
window.onload = renderPacks;
</script>
</body>
</html>
